name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -coverprofile=coverage.out
      - name: Coverage
        run: go tool cover -func=coverage.out | tail -1
      - name: Build
        run: go build ./cmd/reap
